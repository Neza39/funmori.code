<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funmory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section class="hero">
    <div class="hero-content">
        <img src="assets/heading.png" class="hero-logo" alt="Funmory">

        <p class="hero-tagline">
            An offline memory game designed to build memory, focus, and essential early learning skills.
        </p>

        <p class="hero-ages">
            Ages 3-8 • Adjustable difficulty
        </p>

        <a href="#" class="download-btn">
            <img src="assets/download.svg" class="btn-icon" alt="download">
            DOWNLOAD FREE NOW
        </a>

        <a href="#" class="try-btn">
            <img src="assets/play.svg" alt="play">
            Try It Now
        </a>

    </div>
</section>

<section class="themes">
    <div class="themes-container">
        <div class="theme-cards">

            <button class="theme-card" data-theme="math">
                <img src="assets/math.jpg" alt="math">
                <span class="card-overlay">MATH</span>
            </button>

            <button class="theme-card" data-theme="letters">
                <img src="assets/letters.jpg" alt="letters">
                <span class="card-overlay">LETTERS</span>
            </button>

            <button class="theme-card" data-theme="animals">
                <img src="assets/animals.jpg" alt="animals">
                <span class="card-overlay">ANIMALS</span>
            </button>

            <button class="theme-card" data-theme="geo">
                <img src="assets/geography.jpg" alt="geography">
                <span class="card-overlay">GEOGRAPHY</span>
            </button>

            <button class="theme-card" data-theme="shapes">
                <img src="assets/shapes.jpg" alt="shapes">
                <span class="card-overlay">SHAPES</span>
            </button>

        </div>

        <div id="theme-box" class="theme-box">
            <p id="theme-text">this is inf about the theme</p>
        </div>

    </div>
</section>

<div id="gameModal" class="modal hidden">
    <div class="modal-content">
        <button class="close-modal">x</button>
        <canvas id="case1-demo-canvas" width="620" height="420" aria-label="Funmory"></canvas>
    </div>
</div>

<script src="script.js"></script>
<script src="game-demo/case1.js"></script>
</body>
</html>
